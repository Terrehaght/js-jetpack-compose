<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Feed App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Framework Scripts -->
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/layouts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/AndroidFramework.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/material-views.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/material-notifiers.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/.Mainactivity.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/bottom_nav.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/drawer_tools.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/tabs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Terrehaght/js-jetpack-compose@main/js-jetpack-compose/recycler_view.min.js"></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <script>
        const { Activity, Intent, Application, Fragment } = AndroidFramework;
        const { Column, Row, ScrollView, FrameLayout, Constrained, LayoutParams } = AndroidLayouts;
        const { TextView, MaterialButton, MaterialInput,MaterialSwitch, Card, MaterialImage, RecyclerView, 
                MaterialToolbar, MaterialDrawer, BottomNavigation, Snackbar } = AndroidComponents;

        // Story Item Data
        const stories = [
            { id: 1, name: 'Alice', image: 'https://i.pravatar.cc/100?img=1' },
            { id: 2, name: 'Bob', image: 'https://i.pravatar.cc/100?img=2' },
            { id: 3, name: 'Charlie', image: 'https://i.pravatar.cc/100?img=3' },
            { id: 4, name: 'Diana', image: 'https://i.pravatar.cc/100?img=4' },
            { id: 5, name: 'Eve', image: 'https://i.pravatar.cc/100?img=5' },
            { id: 6, name: 'Frank', image: 'https://i.pravatar.cc/100?img=6' },
            { id: 7, name: 'Grace', image: 'https://i.pravatar.cc/100?img=7' },
            { id: 8, name: 'Henry', image: 'https://i.pravatar.cc/100?img=8' }
        ];

        // Post Data
        const posts = [
            { 
                id: 1, 
                user: 'Alice Johnson', 
                avatar: 'https://i.pravatar.cc/150?img=1',
                image: 'https://picsum.photos/seed/post1/800/600',
                caption: 'Beautiful sunset at the beach 🌅',
                likes: 234,
                comments: 12,
                time: '2 hours ago'
            },
            { 
                id: 2, 
                user: 'Bob Smith', 
                avatar: 'https://i.pravatar.cc/150?img=2',
                image: 'https://picsum.photos/seed/post2/800/600',
                caption: 'Coffee and code ☕💻',
                likes: 189,
                comments: 8,
                time: '4 hours ago'
            },
            { 
                id: 3, 
                user: 'Charlie Brown', 
                avatar: 'https://i.pravatar.cc/150?img=3',
                image: 'https://picsum.photos/seed/post3/800/600',
                caption: 'Mountain hiking adventure! 🏔️',
                likes: 456,
                comments: 23,
                time: '6 hours ago'
            }
        ];

        class MainActivity extends Activity {
            constructor() {
                super();
                this.drawer = null;
                this.bottomNav = null;
            }

            onCreate(savedInstanceState) {
                super.onCreate(savedInstanceState);

                // Create Navigation Drawer
                this.drawer = MaterialDrawer({
                    header: {
                        title: 'Social Feed',
                        subtitle: 'user@example.com'
                    },
                    items: [
                        { 
                            id: 'profile', 
                            text: 'Profile', 
                            icon: 'bx bx-user',
                            onClick: () => {
                                Snackbar.show('Profile clicked');
                                this.drawer.close();
                            }
                        },
                        { 
                            id: 'saved', 
                            text: 'Saved Posts', 
                            icon: 'bx bx-bookmark',
                            onClick: () => {
                                Snackbar.show('Saved Posts clicked');
                                this.drawer.close();
                            }
                        },
                        { type: 'divider' },
                        {
                            type: 'section',
                            title: 'Settings',
                            items: [
                                { 
                                    id: 'settings', 
                                    text: 'Preferences', 
                                    icon: 'bx bx-cog',
                                    onClick: () => this.openSettings()
                                },
                                { 
                                    id: 'logout', 
                                    text: 'Logout', 
                                    icon: 'bx bx-log-out',
                                    onClick: () => this.handleLogout()
                                }
                            ]
                        }
                    ]
                });

                // Create Toolbar
                const toolbar = MaterialToolbar({
                    title: 'Social Feed',
                    navigationIcon: 'bx bx-menu',
                    onNavigationClick: () => this.drawer.toggle(),
                    actions: [
                        {
                            icon: 'bx bx-search',
                            label: 'Search',
                            onClick: () => this.openSearch()
                        },
                        {
                            icon: 'bx bx-bell',
                            badge: '5',
                            label: 'Notifications',
                            onClick: () => this.openNotifications()
                        }
                    ],
                    overflowMenu: [
                        { 
                            text: 'Settings', 
                            icon: 'bx bx-cog', 
                            onClick: () => this.openSettings() 
                        },
                        { 
                            text: 'Help', 
                            icon: 'bx bx-help-circle', 
                            onClick: () => Snackbar.show('Help clicked') 
                        }
                    ]
                });

                // Create Stories RecyclerView (Horizontal)
                const storiesRecycler = RecyclerView({
                    data: stories,
                    layoutManager: 'linear',
                    adapter: (story, index) => {
                        return Column({
                            gravity: 'center',
                            gap: 8,
                            padding: { horizontal: 8 }
                        }, [
                            FrameLayout({
                                width: 100,
                                height: 100
                            }, [
                                Constrained({ gravity: 'center' },
                                    MaterialImage({
                                        src: story.image,
                                        aspectRatio: '1:1',
                                        cornerRadius: 50,
                                        elevation: 2,
                                        onClick: () => {
                                            Snackbar.show(`Viewing ${story.name}'s story`);
                                        }
                                    })
                                )
                            ]),
                            TextView({
                                text: story.name,
                                textSize: 12,
                                textColor: '#333',
                                gravity: 'center'
                            })
                        ]).getElement();
                    }
                });

                // Make stories scroll horizontally
                const storiesContainer = storiesRecycler.getElement();
                storiesContainer.style.display = 'flex';
                storiesContainer.style.flexDirection = 'row';
                storiesContainer.style.overflowX = 'auto';
                storiesContainer.style.overflowY = 'hidden';
                storiesContainer.style.padding = '16px 0';

                // Create Posts Feed
                const postsRecycler = RecyclerView({
                    data: posts,
                    layoutManager: 'linear',
                    divider: false,
                    adapter: (post, index) => {
                        return Card({
                            variant: 'outlined',
                            cornerRadius: 0,
                            margin: { bottom: 8 },
                            padding: 0
                        }, [
                            Column({ gap: 0 }, [
                                // Post Header
                                Row({
                                    padding: 12,
                                    gap: 12,
                                    gravity: 'center_vertical'
                                }, [
                                    MaterialImage({
                                        src: post.avatar,
                                        width: 40,
                                        height: 40,
                                        cornerRadius: 20,
                                        aspectRatio: '1:1'
                                    }),
                                    LayoutParams({ weight: 1 },
                                        Column({ gap: 2 }, [
                                            TextView({
                                                text: post.user,
                                                textSize: 14,
                                                textStyle: 'bold'
                                            }),
                                            TextView({
                                                text: post.time,
                                                textSize: 12,
                                                textColor: '#666'
                                            })
                                        ])
                                    ),
                                    MaterialButton({
                                        iconOnly: true,
                                        variant: 'text',
                                        trailingIcon: 'bx bx-dots-horizontal-rounded',
                                        onClick: () => this.showPostOptions(post)
                                    })
                                ]),
                                // Post Image
                                MaterialImage({
                                    src: post.image,
                                    aspectRatio: '4:3',
                                    fit: 'cover',
                                    enableBlurUp: true,
                                    onClick: () => this.openPostDetail(post)
                                }),
                                // Post Actions
                                Row({
                                    padding: 12,
                                    gap: 16
                                }, [
                                    MaterialButton({
                                        iconOnly: true,
                                        variant: 'text',
                                        leadingIcon: 'bx bx-heart',
                                        onClick: () => this.likePost(post)
                                    }),
                                    MaterialButton({
                                        iconOnly: true,
                                        variant: 'text',
                                        leadingIcon: 'bx bx-comment',
                                        onClick: () => this.commentOnPost(post)
                                    }),
                                    MaterialButton({
                                        iconOnly: true,
                                        variant: 'text',
                                        leadingIcon: 'bx bx-share',
                                        onClick: () => this.sharePost(post)
                                    }),
                                    LayoutParams({ weight: 1 }, Column({})),
                                    MaterialButton({
                                        iconOnly: true,
                                        variant: 'text',
                                        leadingIcon: 'bx bx-bookmark',
                                        onClick: () => this.savePost(post)
                                    })
                                ]),
                                // Likes and Caption
                                Column({
                                    padding: { horizontal: 12, bottom: 12 },
                                    gap: 4
                                }, [
                                    TextView({
                                        text: `${post.likes} likes`,
                                        textSize: 14,
                                        textStyle: 'bold'
                                    }),
                                    TextView({
                                        text: post.caption,
                                        textSize: 14,
                                        expandable: true,
                                        collapsedLines: 2
                                    }),
                                    TextView({
                                        text: `View all ${post.comments} comments`,
                                        textSize: 13,
                                        textColor: '#666',
                                        onClick: () => this.viewComments(post)
                                    })
                                ])
                            ])
                        ]).getElement();
                    },
                    onLoadMore: async (offset) => {
                        // Simulate loading more posts
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        const morePosts = [
                            { 
                                id: offset + 1, 
                                user: 'New User', 
                                avatar: `https://i.pravatar.cc/150?img=${offset}`,
                                image: `https://picsum.photos/seed/post${offset}/800/600`,
                                caption: 'New post content',
                                likes: Math.floor(Math.random() * 500),
                                comments: Math.floor(Math.random() * 30),
                                time: 'Just now'
                            }
                        ];
                        return {
                            data: morePosts,
                            hasMore: offset < 10
                        };
                    }
                });

                // Main Layout
                const mainLayout = Column({
                    width: 'match_parent',
                    height: 'match_parent',
                    background: '#fafafa'
                }, [
                    toolbar,
                    storiesRecycler,
                    LayoutParams({ weight: 1 },
                        postsRecycler
                    )
                ]);

                this.setContentView(mainLayout);

                // Setup Bottom Navigation
                this.setupBottomNav();
            }

            setupBottomNav() {
                this.bottomNav = BottomNavigation({
                    itemColor: '#6750A4',
                    background: '#ffffff',
                    onItemSelect: (id) => {
                        Snackbar.show(`Selected: ${id}`);
                    }
                });

                this.bottomNav.setItems([
                    { id: 'home', name: 'Home', icon: 'bx-home' },
                    { id: 'search', name: 'Search', icon: 'bx-search' },
                    { id: 'add', name: 'Create', icon: 'bx-plus-circle' },
                    { id: 'activity', name: 'Activity', icon: 'bx-heart', badge: '3' },
                    { id: 'profile', name: 'Profile', icon: 'bx-user' }
                ]);

                this.bottomNav.selectItem('home');
                this.bottomNav.show();
            }

            likePost(post) {
                Snackbar.success('Post liked!');
            }

            commentOnPost(post) {
                const intent = new Intent(CommentActivity);
                intent.putExtra('postId', post.id);
                this.startActivity(intent);
            }

            sharePost(post) {
                Snackbar.show('Share options', {
                    duration: 3000,
                    action: {
                        text: 'COPY LINK',
                        onClick: () => Snackbar.success('Link copied!')
                    }
                });
            }

            savePost(post) {
                Snackbar.success('Saved to collection');
            }

            viewComments(post) {
                const intent = new Intent(CommentActivity);
                intent.putExtra('postId', post.id);
                this.startActivity(intent);
            }

            showPostOptions(post) {
                MaterialDialog.confirm(
                    'Post Options',
                    'What would you like to do?',
                    {
                        confirmText: 'Report',
                        cancelText: 'Cancel',
                        onConfirm: () => Snackbar.error('Post reported')
                    }
                );
            }

            openPostDetail(post) {
                const intent = new Intent(PostDetailActivity);
                intent.putExtra('post', post);
                this.startActivity(intent);
            }

            openSearch() {
                Snackbar.show('Search feature coming soon');
            }

            openNotifications() {
                Snackbar.show('5 new notifications');
            }

            openSettings() {
                const intent = new Intent(SettingsActivity);
                this.startActivity(intent);
                this.drawer.close();
            }

            handleLogout() {
                MaterialDialog.confirm(
                    'Logout',
                    'Are you sure you want to logout?',
                    {
                        confirmText: 'Logout',
                        confirmError: true,
                        onConfirm: () => {
                            const intent = new Intent(LoginActivity);
                            intent.addFlags(Intent.FLAG_ACTIVITY_CLEAR_TASK, Intent.FLAG_ACTIVITY_NEW_TASK);
                            this.startActivity(intent);
                        }
                    }
                );
            }

            onBackPressed() {
                if (this.drawer.isShowing()) {
                    this.drawer.close();
                } else {
                    MaterialDialog.confirm(
                        'Exit App',
                        'Do you want to exit?',
                        {
                            onConfirm: () => this.finish()
                        }
                    );
                }
            }
        }

        // Comment Activity
        class CommentActivity extends Activity {
            onCreate(savedInstanceState) {
                super.onCreate(savedInstanceState);

                const postId = this.getIntent().getExtra('postId');

                const toolbar = MaterialToolbar({
                    title: 'Comments',
                    navigationIcon: 'bx bx-arrow-back',
                    onNavigationClick: () => this.finish()
                });

                const layout = Column({
                    width: 'match_parent',
                    height: 'match_parent'
                }, [
                    toolbar,
                    LayoutParams({ weight: 1 },
                        ScrollView({ width: 'match_parent', height: 'match_parent' }, [
                            Column({ padding: 16, gap: 16 }, [
                                TextView({
                                    text: 'Comments section',
                                    textSize: 18,
                                    textStyle: 'bold'
                                }),
                                TextView({
                                    text: `Viewing comments for post ${postId}`
                                })
                            ])
                        ])
                    ),
                    Row({
                        padding: 12,
                        gap: 8,
                        background: '#ffffff',
                        elevation: 8
                    }, [
                        LayoutParams({ weight: 1 },
                            MaterialInput({
                                placeholder: 'Add a comment...',
                                type: 'text'
                            })
                        ),
                        MaterialButton({
                            text: 'Post',
                            variant: 'filled',
                            onClick: () => {
                                Snackbar.success('Comment posted!');
                            }
                        })
                    ])
                ]);

                this.setContentView(layout);
            }
        }

        // Post Detail Activity
        class PostDetailActivity extends Activity {
            onCreate(savedInstanceState) {
                super.onCreate(savedInstanceState);

                const toolbar = MaterialToolbar({
                    title: 'Post Detail',
                    navigationIcon: 'bx bx-arrow-back',
                    onNavigationClick: () => this.finish()
                });

                const layout = Column({
                    width: 'match_parent',
                    height: 'match_parent'
                }, [
                    toolbar,
                    ScrollView({ width: 'match_parent', height: 'match_parent' }, [
                        TextView({
                            text: 'Post detail view',
                            padding: 24,
                            textSize: 18
                        })
                    ])
                ]);

                this.setContentView(layout);
            }
        }

        // Settings Activity
        class SettingsActivity extends Activity {
            onCreate(savedInstanceState) {
                super.onCreate(savedInstanceState);

                const toolbar = MaterialToolbar({
                    title: 'Settings',
                    navigationIcon: 'bx bx-arrow-back',
                    onNavigationClick: () => this.finish()
                });

                const layout = Column({
                    width: 'match_parent',
                    height: 'match_parent'
                }, [
                    toolbar,
                    ScrollView({ width: 'match_parent', height: 'match_parent' }, [
                        Column({ padding: 16, gap: 16 }, [
                            TextView({
                                text: 'Account Settings',
                                textSize: 20,
                                textStyle: 'bold'
                            }),
                            MaterialSwitch({
                                label: 'Push Notifications',
                                checked: true,
                                showIcon: true
                            }),
                            MaterialSwitch({
                                label: 'Dark Mode',
                                checked: false,
                                showIcon: true
                            }),
                            MaterialButton({
                                text: 'Privacy Settings',
                                variant: 'outlined',
                                fullWidth: true,
                                leadingIcon: 'bx bx-shield'
                            })
                        ])
                    ])
                ]);

                this.setContentView(layout);
            }
        }

        // Login Activity
        class LoginActivity extends Activity {
            onCreate(savedInstanceState) {
                super.onCreate(savedInstanceState);

                const layout = ScrollView({
                    width: 'match_parent',
                    height: 'match_parent',
                    background: '#ffffff'
                }, [
                    Column({
                        width: 'match_parent',
                        padding: 24,
                        gap: 24,
                        gravity: 'center'
                    }, [
                        Column({
                            gap: 8,
                            margin: { top: 60, bottom: 32 }
                        }, [
                            TextView({
                                text: 'Welcome Back',
                                textSize: 32,
                                textStyle: 'bold',
                                textColor: '#6750A4',
                                gravity: 'center'
                            }),
                            TextView({
                                text: 'Login to continue',
                                textSize: 16,
                                textColor: '#666',
                                gravity: 'center'
                            })
                        ]),
                        Column({ gap: 16 }, [
                            MaterialInput({
                                label: 'Email',
                                type: 'email',
                                leadingIcon: 'bx bx-envelope'
                            }),
                            MaterialInput({
                                label: 'Password',
                                type: 'password',
                                leadingIcon: 'bx bx-lock',
                                passwordToggle: true
                            }),
                            MaterialButton({
                                text: 'Login',
                                variant: 'filled',
                                fullWidth: true,
                                onClick: () => {
                                    const intent = new Intent(MainActivity);
                                    intent.addFlags(Intent.FLAG_ACTIVITY_CLEAR_TASK, Intent.FLAG_ACTIVITY_NEW_TASK);
                                    this.startActivity(intent);
                                }
                            }),
                            TextView({
                                text: 'Forgot password?',
                                textSize: 14,
                                textColor: '#6750A4',
                                gravity: 'center',
                                margin: { top: 8 }
                            })
                        ])
                    ])
                ]);

                this.setContentView(layout);
            }
        }

        // Setup and Launch
        Application.setupBackButton();
        Application.launch(MainActivity);
    </script>
</body>
</html>
