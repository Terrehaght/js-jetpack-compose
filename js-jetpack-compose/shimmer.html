<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AndroidComponents – Usage Example</title>

<!-- Font Awesome for icon class names used by Icon / MaterialButton etc. -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
  /* ─── page chrome ─── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: #f2f0f5;
    color: #1c1b1f;
    min-height: 100vh;
    padding: 32px 24px;
  }

  h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #49454f;
    margin: 28px 0 10px;
  }
  h2:first-of-type { margin-top: 0; }

  .row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
  }

  /* demo card that wraps each section */
  .demo-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-width: 560px;
  }

  /* mount targets – components inject themselves here */
  .mount { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     Stub: window.AndroidLayouts.utils
     components.js pulls dp() and applyStyles() from here.
     If you already load layouts.js, remove this block.
     ═══════════════════════════════════════════════════ -->
<script>
window.AndroidLayouts = {
  utils: {
    /**
     * dp(value)  – converts a numeric dp value to a px string.
     *   • number          → "Npx"
     *   • "match_parent"  → "100%"
     *   • array [a,b,…]   → "apx bpx …"
     *   • anything else   → passed through as-is
     */
    dp(val) {
      if (val == null)            return undefined;
      if (Array.isArray(val))     return val.map(v => typeof v === 'number' ? v + 'px' : v).join(' ');
      if (typeof val === 'number') return val + 'px';
      if (val === 'match_parent') return '100%';
      return val;                 // already a string like "60%"
    },

    /**
     * applyStyles(element, styleMap)
     * Thin wrapper – sets every key on element.style.
     */
    applyStyles(el, styles) {
      if (!el || !styles) return;
      Object.entries(styles).forEach(([key, val]) => {
        if (val != null) el.style[key] = val;
      });
    }
  }
};
</script>

<script src="material-views.js"></script>

<!-- ═══════════════════════════════════════════════════
     Demo Page – uses every component once
     ═══════════════════════════════════════════════════ -->
<div class="demo-card">

  <!-- 1 ── TextView ── -->
  <h2>TextView</h2>
  <div id="mount-textview" class="mount"></div>

  <!-- 2 ── Icon ── -->
  <h2>Icon</h2>
  <div id="mount-icon" class="row"></div>

  <!-- 3 ── Divider ── -->
  <h2>Divider</h2>
  <div id="mount-divider"></div>

  <!-- 4 ── Avatar ── -->
  <h2>Avatar</h2>
  <div id="mount-avatar" class="row"></div>

  <!-- 5 ── MaterialButton ── -->
  <h2>MaterialButton</h2>
  <div id="mount-buttons" class="row"></div>

  <!-- 6 ── MaterialSwitch ── -->
  <h2>MaterialSwitch</h2>
  <div id="mount-switch" class="row"></div>

  <!-- 7 ── MaterialInput ── -->
  <h2>MaterialInput</h2>
  <div id="mount-input" class="mount"></div>

  <!-- 8 ── MaterialSpinner ── -->
  <h2>MaterialSpinner</h2>
  <div id="mount-spinner" class="row"></div>

  <!-- 9 ── Card (with children) ── -->
  <h2>Card</h2>
  <div id="mount-card"></div>

  <!-- 10 ── Shimmer (single) ── -->
  <h2>Shimmer – single bars</h2>
  <div id="mount-shimmer" class="mount"></div>

  <!-- 11 ── ShimmerPreset.card ── -->
  <h2>ShimmerPreset – card skeleton</h2>
  <div id="mount-shimmer-card"></div>

  <!-- 12 ── ShimmerPreset.listItem ── -->
  <h2>ShimmerPreset – list item skeleton</h2>
  <div id="mount-shimmer-list"></div>

  <!-- 13 ── ShimmerPreset.grid ── -->
  <h2>ShimmerPreset – grid skeleton</h2>
  <div id="mount-shimmer-grid"></div>

</div>

<script>
// ─── shortcut ───
const C = window.AndroidComponents;

// ─── 1. TextView ───
const tv1 = C.TextView({ text: 'Hello — plain text', textSize: 16 });
const tv2 = C.TextView({ text: 'Bold + icon', textSize: 14, textStyle: 'bold', icon: 'fa-solid fa-rocket', iconColor: '#6750a4' });
document.getElementById('mount-textview').append(tv1.getElement(), tv2.getElement());

// ─── 2. Icon ───
['fa-solid fa-sun', 'fa-solid fa-moon', 'fa-solid fa-star'].forEach(name => {
  document.getElementById('mount-icon').appendChild(C.Icon({ name, size: 28, color: '#6750a4' }).getElement());
});

// ─── 3. Divider ───
document.getElementById('mount-divider').appendChild(C.Divider({ margin: [8, 0] }).getElement());

// ─── 4. Avatar ───
['Alice', 'Bob'].forEach(name => {
  document.getElementById('mount-avatar').appendChild(C.Avatar({ text: name, size: 44 }).getElement());
});
document.getElementById('mount-avatar').appendChild(C.Avatar({ icon: 'fa-solid fa-user', size: 44, background: '#d0bcff', color: '#381e72' }).getElement());

// ─── 5. MaterialButton ───
const btnMount = document.getElementById('mount-buttons');
['filled','outlined','text','tonal'].forEach(variant => {
  btnMount.appendChild(C.MaterialButton({
    text: variant.charAt(0).toUpperCase() + variant.slice(1),
    variant,
    onClick: () => alert(`${variant} clicked`)
  }).getElement());
});

// ─── 6. MaterialSwitch ───
document.getElementById('mount-switch').appendChild(
  C.MaterialSwitch({ label: 'Dark mode', checked: false, onChange: v => console.log('switch →', v) }).getElement()
);

// ─── 7. MaterialInput ───
const inputMount = document.getElementById('mount-input');
inputMount.appendChild(C.MaterialInput({ label: 'Email', type: 'email', leadingIcon: 'fa-solid fa-envelope', helperText: 'We will never share your email.' }).getElement());
inputMount.appendChild(C.MaterialInput({ label: 'Password', type: 'password', value: 'secret' }).getElement());

// ─── 8. MaterialSpinner ───
document.getElementById('mount-spinner').appendChild(C.MaterialSpinner({ size: 32 }).getElement());

// ─── 9. Card (with nested children) ───
document.getElementById('mount-card').appendChild(
  C.Card(
    { variant: 'elevated', padding: 20, cornerRadius: 16, gap: 10 },
    [
      C.TextView({ text: 'Card Title', textSize: 18, textStyle: 'bold' }),
      C.Divider({}),
      C.TextView({ text: 'Cards can nest any component as a child.', textSize: 14 }),
      C.MaterialButton({ text: 'Learn more', variant: 'text' })
    ]
  ).getElement()
);

// ─── 10. Shimmer – single bars ───
const shimMount = document.getElementById('mount-shimmer');
// default bar

// custom colours
shimMount.appendChild(C.ShimmerPreset.listItem({ angle:180,color: '#e9e9e9', highlightColor: '#ffffff', duration: 1800 }).getElement());

// ─── 11. ShimmerPreset – card ───
document.getElementById('mount-shimmer-card').appendChild(C.ShimmerPreset.card().getElement());

// ─── 12. ShimmerPreset – listItem ───
document.getElementById('mount-shimmer-list').appendChild(C.ShimmerPreset.listItem().getElement());

// ─── 13. ShimmerPreset – grid ───
document.getElementById('mount-shimmer-grid').appendChild(C.ShimmerPreset.grid({ columns: 3, cardHeight: 120 }).getElement());
</script>

</body>
</html>
